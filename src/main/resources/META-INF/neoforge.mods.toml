modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = ""

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "pack.png"
logoBlur = false
displayTest = "IGNORE_SERVER_VERSION"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "pjmbasemod.mixins.json"

# Опциональный миксин в SuperbWarfare (логирование уничтожения техники). required=false —
# без SuperbWarfare класс-таргет не загружается и миксин просто не применяется.
[[mixins]]
config = "pjmbasemod.sbw.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "geckolib"
type = "required"
versionRange = "[4.7,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "voicechat"
type = "optional"
# Версия SVC идёт с префиксом версии MC, напр. "1.21.1-2.6.18".
# Maven-сравнение читает первый токен (1.x.x), поэтому "[2.5,)" ложно отсекает.
# Диапазон с MC-префиксом корректно покрывает SVC 2.5+ для 1.21.1.
versionRange = "[1.21.1-2.5,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "journeymap"
type = "optional"
versionRange = "[1.21-6.0.0-beta.1,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "superbwarfare"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "tacz"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"
